name: CI — Fruit Classifier

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    name: Lint · Train · Test
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: "sqlite:///:memory:"
      SECRET_KEY: "ci-secret"

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest-cov

      - name: 🔍 Lint (flake8)
        run: flake8 app.py routes/ db/ ml/ --max-line-length=120 --ignore=E501,W503

      - name: 🏋️ Train ML models
        run: python ml/train.py

      - name: 🧪 Run pytest with coverage
        run: pytest tests/ -v --tb=short --cov=. --cov-report=term-missing --cov-report=xml

      - name: 📊 Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7
