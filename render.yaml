services:
  - type: web
    name: fruit-classifier
    runtime: python
    buildCommand: "pip install -r requirements.txt && python ml/train.py"
    startCommand: "gunicorn app:app"
    envVars:
      - key: DATABASE_URL
        sync: false          # set manually in Render dashboard (your Supabase URL)
      - key: SECRET_KEY
        generateValue: true  # Render auto-generates a secure value
    autoDeploy: false        # controlled by GitHub Actions CD workflow
